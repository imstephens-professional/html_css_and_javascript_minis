<!DOCTYPE html>
<html lang ="eng">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content=""width=device-width, initial-scale="1.0">
        <title>My Fourth Document</title> <!--The header seen on tab-->
        <style>
            /***Turns into these colors when mouse is hovering over the button***/
           button:hover {
            background-color: bisque;
            color: indianred;
           }
            
           /***Turns into these colors when clicked***/
           button:active {
            background-color: brown;
            color: bisque;
           }

           /***Turns aquamarine after link was interacted with***/
           a:visited {
            color: aquamarine;
           }

           /***Turns yellow when focused on***/
           input:focus {
            background-color: yellow;
           }

           /***Changes the bckgd color of corresponding <p> ***/
           p:nth-child(2n+3) {             /***Change to 2n to effect all even nums***/
            background-color: red;
           }
           
           p:first-child {
            background-color: yellowgreen;
           }
        </style>
    </head>
    <body>
        <p>One</p>          <!--Turns yellow (first-child)-->
        <p>Two</p>
        <p>Three</p>        <!--Turns red (nth-child)-->
        <p>Four</p>
        <p>Five</p>         <!--Turns red (nth-child)-->
        <div>
            <p>Six</p>      <!--Turns yellow (first-child)-->
            <p>Seven</p>
            <p>Eight</p>    <!--Turns red (nth-child)-->
            <p>Nine</p>
        </div>

        <button>
            Click Me
        </button>

        <!--Link turns a different color after being clicked once-->
        <a href="#####">
            Click Here
        </a>

        <input type="text"/>
    </body>


</html>
