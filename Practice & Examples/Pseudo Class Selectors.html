<!DOCTYPE html>
<html lang ="eng">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content=""width=device-width, initial-scale="1.0">
        <title>My Fourth Document</title> <!--The header seen on tab-->
        <style>
            /***Turns into these colors when mouse is hovering over the button***/
           button:hover {
            background-color: bisque;
            color: indianred;
           }
            
           /***Turns into these colors when clicked***/
           button:active {
            background-color: brown;
            color: bisque;
           }

           /***Turns aquamarine after link was interacted with***/
           a:visited {
            color: aquamarine;
           }

           /***Turns yellow when focused on***/
           input:focus {
            background-color: yellow;
           }
        </style>
    </head>
    <body>
        <button>
            Click Me
        </button>

        <!--Link turns a different color after being clicked once-->
        <a href="#####">
            Click Here
        </a>

        <input type="text"/>
    </body>


</html>
