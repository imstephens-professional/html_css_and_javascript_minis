<!DOCTYPE html>
<html lang ="eng">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content=""width=device-width, initial-scale="1.0">
        <title>My Second Document</title> <!--The header seen on tab-->
    </head>
    <body>
        <form action="" method="">
            <!--Put readonly if you don't want the user to change the input.-->
            <!--Put hidden if you want to hide the input.-->
            <input name="Text" type="text" placeholder="For text"/>                <!--text box-->
            </br>
            <input type="number" max="10" min="1" placeholder="For numbers"/>      <!--num box w/ scrolling wheel-->
            </br>
            <input type="email"/>                                                  <!--email-->
            </br>
            <input type="password"/>                                               <!--password - can prompt website for saved passwords-->
            </br>
            <input type="date"/>                                                   <!--date structure-->
            </br>
            <input type="file"/>                                                   <!--selects files-->
            </br>
            <label>Select this radio dot.</label>
            <input type="radio"/>
            </br>
            <input type="checkbox"/>
            <label>Do you accept the terms and conditions?</label>
            </br>
            <select>
                <option>Red</option>
                <option>Blue</option>
                <option>Yellow</option>
            </select>
            </br>
            <input type="submit"/>                                                 <!--submit button-->
        </form>
    </body>


</html>
